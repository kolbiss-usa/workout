  const el=document.getElementById('rex-list');if(!el||!window._pr)return;
  if(!window._pr.exercises.length){el.innerHTML=`<div style="padding:11px;text-align:center;color:var(--muted);font-size:12px">No exercises added yet</div>`;return;}
  el.innerHTML=window._pr.exercises.map((e,i)=>{const info=getEx(e.exId);return`<div style="display:flex;align-items:center;padding:9px 11px;border-bottom:1px solid var(--border)"><div style="flex:1"><div style="font-size:13px;font-weight:600">${info?.name||'?'}</div><div style="display:flex;gap:6px;margin-top:5px;align-items:center"><input type="number" value="${e.sets||3}" min="1" style="width:52px;font-size:12px;padding:4px" onchange="updPEx(${i},'sets',this.value)"><span style="color:var(--muted);font-size:11px">×</span><input type="number" value="${e.r||''}" placeholder="Reps" style="width:52px;font-size:12px;padding:4px" onchange="updPEx(${i},'r',this.value)"><span style="color:var(--muted);font-size:11px">@</span><input type="number" value="${e.w||''}" placeholder="${S.unit}" style="width:58px;font-size:12px;padding:4px" onchange="updPEx(${i},'w',this.value)"></div></div><button class="ib delbtn" onclick="rmPEx(${i})" style="margin-left:8px;font-size:12px">✕</button></div>`;}).join('');
}
function updPEx(i,f,v){if(window._pr)window._pr.exercises[i][f]=v;}
function rmPEx(i){if(window._pr){window._pr.exercises.splice(i,1);renderPendingEx();}}
function addExToRoutine(rid,exId){if(window._pr&&window._pr.id===rid){const pr=S.prs[exId];window._pr.exercises.push({exId,sets:3,r:pr?.r||'',w:pr?.w||''});renderPendingEx();}}
function saveRoutine(rId){const name=document.getElementById('rn')?.value?.trim();if(!name){toast('Enter a name');return;}if(!window._pr?.exercises.length){toast('Add at least one exercise');return;}window._pr.name=name;if(!S.routines)S.routines=[];S.routines.push({...window._pr,exercises:[...window._pr.exercises]});delete window._pr;save();document.getElementById('rout-ov')?.remove();renderLibrary(document.getElementById('content'));toast('Routine saved','green');}
function showRoutineDetail(id){const r=S.routines.find(x=>x.id===id);if(!r)return;const ov=document.createElement('div');ov.className='ov';ov.innerHTML=`<div class="modal"><div class="mh"></div><div class="mt">${r.name}</div><div style="border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:13px">${r.exercises.map(e=>{const info=getEx(e.exId);return`<div style="padding:9px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between"><div style="font-size:13px;font-weight:600">${info?.name||'?'}</div><div class="mono" style="font-size:11px;color:var(--muted)">${e.sets||3}×${e.r||'?'} @ ${e.w||'?'}${S.unit}</div></div>`;}).join('')}</div><button class="btn btp bfw" onclick="startFromRoutine('${r.id}');go('workout');this.closest('.ov').remove()">▶ Start</button><button class="btn btd bfw" style="margin-top:8px" onclick="delRoutine('${r.id}')">Delete Routine</button><button class="btn btg bfw" style="margin-top:7px" onclick="this.closest('.ov').remove()">Close</button></div>`;document.body.appendChild(ov);}
function delRoutine(id){customConfirm('Delete this routine?','Delete',()=>{S.routines=S.routines.filter(r=>r.id!==id);save();document.querySelectorAll('.ov').forEach(el=>el.remove());renderLibrary(document.getElementById('content'));});}

// ══════════════ SETTINGS ══════════════
function showSettings(){
  const ov=document.createElement('div');ov.className='ov';
  ov.innerHTML=`<div class="modal"><div class="mh"></div><div class="mt">Settings</div>
    <div class="fg"><label class="fl">Your Name</label><input type="text" id="sname" value="${S.name||''}" placeholder="e.g. Kolbe" onchange="S.name=this.value;save()"></div>
    <div class="fg"><label class="fl">Weight Unit</label><div class="frow"><button class="btn bfw${S.unit==='lbs'?' btp':' bts'}" onclick="S.unit='lbs';save();this.className='btn bfw btp';this.nextSibling.className='btn bfw bts'">lbs</button><button class="btn bfw${S.unit==='kg'?' btp':' bts'}" onclick="S.unit='kg';save();this.className='btn bfw btp';this.previousSibling.className='btn bfw bts'">kg</button></div></div>
    <div class="fg"><label class="fl">Bodyweight (${S.unit})</label><input type="number" inputmode="decimal" value="${S.bodyweight||185}" onchange="S.bodyweight=parseFloat(this.value)||185;save()"></div>
    <div class="fg"><label class="fl">Default Rest: <span id="rdlbl">${S.restDur}s</span></label><input type="range" min="30" max="300" step="15" value="${S.restDur}" oninput="S.restDur=parseInt(this.value);document.getElementById('rdlbl').textContent=this.value+'s';save()"></div>
    <div class="fg" style="border-top:1px solid var(--border);padding-top:13px;margin-top:4px"><label class="fl">Data</label><button class="btn btd bfw" onclick="confirmReset()">Reset All Data</button></div>
    <button class="btn btg bfw" style="margin-top:8px" onclick="this.closest('.ov').remove();render()">Done</button>
  </div>`;
  document.body.appendChild(ov);
}
function confirmReset(){customConfirm('All workouts, PRs, and settings will be permanently deleted.','Reset everything',()=>{localStorage.removeItem('ironlog_v4');initState();document.querySelectorAll('.ov').forEach(el=>el.remove());render();toast('Reset complete');});}

// ══════════════ PWA ══════════════
function injectManifest(){const m={name:'IronLog',short_name:'IronLog',start_url:'.',display:'standalone',background_color:'#f5f1ec',theme_color:'#f5f1ec',icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' fill='%231e3558'/%3E%3Cpath d='M48 80v32M48 96h96M144 80v32M64 88v16M80 84v24M112 84v24M128 88v16' stroke='white' stroke-width='8' stroke-linecap='round'/%3E%3C/svg%3E",sizes:'192x192',type:'image/svg+xml'}]};const blob=new Blob([JSON.stringify(m)],{type:'application/manifest+json'});const link=document.createElement('link');link.rel='manifest';link.href=URL.createObjectURL(blob);document.head.appendChild(link);}

// ══════════════ INIT ══════════════
load();injectManifest();render();
if(S.activeWorkout)startWtTimer();
</script>
</body>
</html>
